<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template News - Al Jazeera Style</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            direction: rtl;
            text-align: right;
        }
    </style>
</head>
<body>
    <header class="bg-dark text-white text-center py-3">
        <h1>أخبار العالم</h1>
    </header>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <article class="mb-4">
                    <h2>عنوان الخبر الأول</h2>
                    <p>هذا هو نص الخبر الأول. هنا يمكنك كتابة تفاصيل الخبر والتعليقات ذات الصلة.</p>
                </article>
                <article class="mb-4">
                    <h2>عنوان الخبر الثاني</h2>
                    <p>هذا هو نص الخبر الثاني. هنا يمكنك كتابة تفاصيل الخبر والتعليقات ذات الصلة.</p>
                </article>
            </div>
            <div class="col-md-4">
                <aside class="bg-light p-3">
                    <h3>أخبار سريعة</h3>
                    <ul class="list-group">
                        <li class="list-group-item">خبر سريع 1</li>
                        <li class="list-group-item">خبر سريع 2</li>
                        <li class="list-group-item">خبر سريع 3</li>
                    </ul>
                </aside>
            </div>
        </div>
    </div>
    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2026 جميع الحقوق محفوظة</p>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.0.7/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
